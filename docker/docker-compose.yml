version: "3.8"

services:
  # ==================== 1. OTel Collector ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    depends_on:
      - jaeger
      - prometheus
      - loki

  # ==================== 2. Prometheus ====================
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ==================== 3. Loki ====================
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml

  # ==================== 4. Jaeger ====================
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true    # ← 开启 OTLP 接收
    ports:
      - "16686:16686"   # Web UI
#      - "14250:14250"   # OTLP 端口（内部通信用）
#      - "4317:4317"     # Jaeger 自己也监听 4317

  # ==================== 5. Grafana ====================
  grafana:
    image: grafana/grafana:11.4.1
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true   # 免登录，开发方便
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
