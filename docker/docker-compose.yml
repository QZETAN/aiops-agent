# ============================================================================
# AIOps Agent 一体化部署
# ============================================================================
#
# 启动全部（含 Grafana）：
#   docker compose --profile full up -d
#
# 启动核心（不含 Grafana，省内存）：
#   docker compose up -d
#
# 核心 5 个容器：
#   aiops-agent    → 诊断引擎 + Web UI（:8000 API / :8501 UI）
#   otel-collector → 接收微服务上报数据（:4317）
#   prometheus     → 指标存储（:9090）
#   loki           → 日志存储（:3100）
#   jaeger         → 调用链存储（:16686）
#
# 可选：
#   grafana        → 可视化看板（:3000）—— profile: full
# ============================================================================

version: "3.8"

services:
  # ==================== 1. AIOps Agent（API + Web UI）====================
  aiops-agent:
    build:
      context: ..
      dockerfile: Dockerfile
    image: aiops-agent:latest
    container_name: aiops-agent
    ports:
      - "8000:8000"     # HTTP API
      - "8501:8501"     # Web UI
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - JAEGER_URL=http://jaeger:16686
    depends_on:
      - prometheus
      - loki
      - jaeger
    restart: unless-stopped

  # ==================== 2. OTel Collector ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
      - prometheus
      - loki
    restart: unless-stopped

  # ==================== 3. Prometheus ====================
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ==================== 4. Loki ====================
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  # ==================== 5. Jaeger ====================
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - MEMORY_MAX_TRACES=10000
    ports:
      - "16686:16686"
    restart: unless-stopped

  # ==================== 6. Grafana（可选）====================
  grafana:
    image: grafana/grafana:11.4.1
    container_name: grafana
    profiles:
      - full
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    restart: unless-stopped
